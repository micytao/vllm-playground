name: vllm-playground
options:
  bundleIdPrefix: com.vllm-playground
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "Apple Development"
    CODE_SIGN_STYLE: Automatic

targets:
  vllm-playground:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: vllm-playground
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_CFBundleDisplayName: "vLLM Playground"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: true
        SWIFT_EMIT_LOC_STRINGS: true
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    info:
      path: vllm-playground/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSMicrophoneUsageDescription: "vLLM Playground needs microphone access for voice input and audio features."
        NSSpeechRecognitionUsageDescription: "vLLM Playground uses speech recognition to convert your voice to text for chat messages."
        NSPhotoLibraryUsageDescription: "vLLM Playground needs access to your photo library to attach images for Vision Language Model queries."
        NSPhotoLibraryAddUsageDescription: "vLLM Playground needs permission to save generated images to your photo library."
        NSCameraUsageDescription: "vLLM Playground needs camera access to capture images for Vision Language Model queries."
